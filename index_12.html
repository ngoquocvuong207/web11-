<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form nhập URL giả lập</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 26px;
      color: #58a6ff;
      border-bottom: 2px solid #21262d;
      padding-bottom: 12px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #8b949e;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 15px;
      font-family: monospace;
      box-sizing: border-box;
    }

    button[type="submit"] {
      margin-top: 14px;
      padding: 10px 24px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>

  <h1>Form nhập URL giả lập</h1>

  <form action="#" method="get">
    <label for="urlInput">Nhập URL cần phân tích:</label>
    <input
      type="text"
      id="urlInput"
      name="url"
      placeholder="https://example.com/products/list?page=2#top"
    />
    <button type="submit">Phân tích URL</button>
  </form>

</body>
</html>
